<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HCMOS</title>
  <style>
    :root { font-family: system-ui, sans-serif; }
    body { margin: 0; color: #1a2332; background: #f4f6f9; }
    header { display: flex; gap: 1rem; align-items: center; padding: .75rem 1rem; background: #12324f; color: #fff; }
    header .role { margin-left: auto; opacity: .85; font-size: .9rem; }
    header button { margin-left: 1rem; }
    nav ul { list-style: none; display: flex; flex-wrap: wrap; gap: .5rem; padding: .75rem 1rem; margin: 0; }
    nav li { padding: .4rem .8rem; background: #fff; border: 1px solid #d7dee7; border-radius: 6px; cursor: pointer; text-transform: capitalize; }
    main { padding: 1rem; }
    .login { max-width: 320px; margin: 4rem auto; display: grid; gap: .6rem; }
    .login input, .login button { padding: .6rem; font-size: 1rem; }
    .login .error { color: #b00020; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="./app.js"></script>
</body>
</html>
