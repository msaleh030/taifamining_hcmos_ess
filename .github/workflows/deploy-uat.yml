name: Deploy UAT

# GO.md end-to-end against the Kira-approved Frankfurt (DE) KVM 2 (Path A: the
# runner has the egress this sandboxed session does not). Trigger: the
# .github/DEPLOY-UAT sentinel push (Code, on Kira's word) or the Actions
# "Run workflow" button (Kira). Secrets (Settings → Secrets → Actions):
#   HOSTINGER_API_TOKEN      required — one-time provisioning credential
#   UAT_SSH_PRIVATE_KEY      required — deploy keypair (public half is derived)
#   CLOUDFLARE_TUNNEL_TOKEN  optional — token-managed tunnel; else edge is Kira-side
# All secrets are masked by Actions; the scripts never echo them, and user
# credentials are written only to /root/uat-credentials.txt ON THE BOX (600).
on:
  workflow_dispatch:
  push:
    branches: [claude/nifty-goodall-poihi4]
    paths: ['.github/DEPLOY-UAT']

concurrency:
  # A new deploy CANCELS an in-flight one: the deploy is idempotent (seed-guard,
  # prov() dup-checks), so the latest push should always win rather than queue
  # behind — and a hung run must not block the next fix from landing.
  group: deploy-uat
  cancel-in-progress: true

jobs:
  deploy:
    name: Provision + harden + deploy (Frankfurt KVM 2)
    runs-on: ubuntu-latest
    # A hang (slow box npm/apt, stalled SSH) must fail the job, not run for
    # hours. The whole provision+deploy normally completes in ~1 minute.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Preflight — secrets present
        env:
          H: ${{ secrets.HOSTINGER_API_TOKEN }}
          K: ${{ secrets.UAT_SSH_PRIVATE_KEY }}
          CF: ${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}
        run: |
          missing=""
          [ -n "$H" ] || missing="$missing HOSTINGER_API_TOKEN"
          [ -n "$K" ] || missing="$missing UAT_SSH_PRIVATE_KEY"
          if [ -n "$missing" ]; then
            echo "::error::Missing repo secrets:$missing — add under Settings → Secrets and variables → Actions, then re-run."
            exit 1
          fi
          echo "secrets present (values masked)"
          if [ -n "$CF" ]; then echo "edge: CLOUDFLARE_TUNNEL_TOKEN present — cloudflared will be installed on the box (DNS route + Access policy remain dashboard steps)"; else echo "edge: no tunnel token — the whole edge is Kira's dashboard step (deploy/cloudflare-edge.md)"; fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Build the ENFORCED frontend from this exact ref — the same build CI
      # pixel-diffs against the 36 locked baselines.
      - name: Build enforced frontend
        working-directory: frontend
        run: |
          npm install --no-audit --no-fund
          npm run build

      - name: Provision + deploy (checkpointed)
        env:
          HOSTINGER_API_TOKEN: ${{ secrets.HOSTINGER_API_TOKEN }}
          UAT_SSH_PRIVATE_KEY: ${{ secrets.UAT_SSH_PRIVATE_KEY }}
          CLOUDFLARE_TUNNEL_TOKEN: ${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}
          # Kira's region decision: pin the unset VM to Frankfurt; Manchester
          # box (1798564) stays unused pending his cancel-vs-spare call.
          UAT_VM_ID: '1798551'
        run: bash deploy/gha/deploy-uat.sh
