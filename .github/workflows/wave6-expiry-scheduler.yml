name: Wave6 Expiry-Alert Scheduler Probe

# Wave 6 (2026-07-14): the daily expat/document expiry sweep is wired to a
# systemd timer. This probe confirms on the deployed box: the timer is enabled,
# and the DEPLOYED scheduler routes an expiring expat permit to the Head of HR
# (R11) only. Seeds a throwaway expat + permit, runs the real script, asserts
# the route, then removes every trace. Sentinel: .github/RUN-WAVE6.
on:
  workflow_dispatch:
  push:
    branches: [claude/nifty-goodall-poihi4]
    paths: ['.github/RUN-WAVE6']

concurrency: { group: wave6, cancel-in-progress: false }

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      UAT_IP: 152.239.121.249
      UAT_CO: 11111111-1111-1111-1111-111111111111
    steps:
      - uses: actions/checkout@v4
      - name: SSH path — tunnel first, direct fallback
        env:
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          mkdir -p ~/.ssh && printf '%s\n' "${{ secrets.UAT_SSH_PRIVATE_KEY }}" > ~/.ssh/uat && chmod 600 ~/.ssh/uat
          sudo curl -sSL -o /usr/local/bin/cloudflared \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 \
            && sudo chmod +x /usr/local/bin/cloudflared || true
          cat > ~/.ssh/config <<EOF
          Host uat-tunnel
            HostName ssh.uat.taifamining.tz
            User root
            IdentityFile ~/.ssh/uat
            StrictHostKeyChecking accept-new
            ProxyCommand /usr/local/bin/cloudflared access ssh --hostname %h --service-token-id $CF_ACCESS_CLIENT_ID --service-token-secret $CF_ACCESS_CLIENT_SECRET
          Host uat-direct
            HostName $UAT_IP
            User root
            IdentityFile ~/.ssh/uat
            StrictHostKeyChecking accept-new
            ConnectTimeout 10
          EOF
          chmod 600 ~/.ssh/config
          if timeout 30 ssh uat-tunnel true 2>/dev/null; then echo uat-tunnel > /tmp/ssh_host; echo tunnel; exit 0; fi
          for i in $(seq 1 100); do
            ssh uat-direct true 2>/dev/null && { echo uat-direct > /tmp/ssh_host; echo direct; exit 0; }
            echo "waiting ($i/100)"; sleep 15
          done
          echo FATAL; exit 1

      - name: BUILD_SHA START + timer enabled + deployed scheduler routes expat→R11
        run: |
          SSH="ssh $(cat /tmp/ssh_host)"
          echo "── BUILD_SHA (running process) at START of Wave 6 ──"
          $SSH "curl -fsS http://127.0.0.1:3000/health 2>/dev/null; echo; cat /opt/hcmos/BUILD_SHA 2>/dev/null | head -c 40; echo"
          echo "── the daily timer is installed + enabled, with a scheduled next run ──"
          $SSH "systemctl is-enabled hcmos-expiry-alerts.timer 2>/dev/null || echo 'NOT-ENABLED'; systemctl list-timers hcmos-expiry-alerts.timer --no-pager 2>/dev/null | sed -n '1,3p'"
          echo "── seed a THROWAWAY expat + expiring expat permit, run the DEPLOYED sweep, assert route ──"
          $SSH "sudo -u postgres psql -d hcmos -v ON_ERROR_STOP=1 <<'SQL'
          INSERT INTO employee (id, company_id, site_id, full_name, role_code, status, is_expat)
            VALUES ('a0000000-0000-0000-0000-0000000006e1'::uuid,'$UAT_CO',
                    (SELECT id FROM site WHERE company_id='$UAT_CO' ORDER BY id LIMIT 1),
                    'Zz W6 Probe Expat','R01','active',true);
          INSERT INTO employee_document (company_id, employee_id, kind, name, valid_until, permit_type)
            VALUES ('$UAT_CO','a0000000-0000-0000-0000-0000000006e1'::uuid,'permit','Zz W6 Probe Permit','2026-07-24','expat');
          INSERT INTO employee (id, company_id, site_id, full_name, role_code, status, is_expat)
            VALUES ('a0000000-0000-0000-0000-0000000006e2'::uuid,'$UAT_CO',
                    (SELECT id FROM site WHERE company_id='$UAT_CO' ORDER BY id LIMIT 1),
                    'Zz W6 Probe Unclassified','R01','active',true);
          INSERT INTO employee_document (company_id, employee_id, kind, name, valid_until, permit_type)
            VALUES ('$UAT_CO','a0000000-0000-0000-0000-0000000006e2'::uuid,'permit','Zz W6 Probe Permit U','2026-07-24',NULL);
          SQL" || { echo 'SEED FAILED'; exit 1; }
          # Run the REAL deployed scheduler entrypoint (as the app user, with env).
          $SSH "hcmos-run node scripts/run-expiry-alerts.js 2026-07-14" | tail -4
          echo "── the raised alerts: expat permit → R11 (site-less); unclassified → R11 unclassified ──"
          $SSH "sudo -u postgres psql -d hcmos -c \"
            SELECT left(e.full_name,20) AS who, a.kind, a.notify_role, a.notify_site IS NULL AS site_less, a.unclassified, a.status
              FROM doc_alert a JOIN employee_document d ON d.id=a.document_id JOIN employee e ON e.id=d.employee_id
             WHERE e.id IN ('a0000000-0000-0000-0000-0000000006e1','a0000000-0000-0000-0000-0000000006e2') ORDER BY who\""

      - name: BUILD_SHA END + audit chain (unchanged by the sweep) + cleanup
        if: always()
        run: |
          SSH="ssh $(cat /tmp/ssh_host)"
          echo "── audit chain: the sweep writes doc_alert/notification, NOT audit — head must be unchanged + intact ──"
          $SSH "sudo -u postgres psql -d hcmos -c \"
            SELECT (SELECT max(seq) FROM audit WHERE company_id='$UAT_CO') AS head_seq,
                   bool_and(hash = encode(sha256(convert_to(prev_hash || concat_ws('|',
                     company_id::text, coalesce(actor,''), coalesce(role,''), action,
                     coalesce(entity,''), coalesce(entity_id,''), ts::text,
                     coalesce(before::text,''), coalesce(after::text,'')), 'UTF8')),'hex')) AS recompute_ok
              FROM audit WHERE company_id='$UAT_CO';
            SELECT count(*) AS linkage_breaks FROM (
              SELECT prev_hash, lag(hash) OVER (PARTITION BY company_id ORDER BY seq) AS expect FROM audit) x
             WHERE (expect IS NULL AND prev_hash <> repeat('0',64)) OR (expect IS NOT NULL AND prev_hash <> expect)\""
          echo "── BUILD_SHA (running process) at END of Wave 6 ──"
          $SSH "curl -fsS http://127.0.0.1:3000/health 2>/dev/null; echo"
          echo "── cleanup: remove every throwaway probe row (alerts, notifications, docs, employees) ──"
          $SSH "sudo -u postgres psql -d hcmos <<'SQL'
          DELETE FROM doc_alert WHERE document_id IN (SELECT id FROM employee_document WHERE employee_id IN ('a0000000-0000-0000-0000-0000000006e1','a0000000-0000-0000-0000-0000000006e2'));
          DELETE FROM notification WHERE employee_id IN ('a0000000-0000-0000-0000-0000000006e1','a0000000-0000-0000-0000-0000000006e2');
          DELETE FROM employee_document WHERE employee_id IN ('a0000000-0000-0000-0000-0000000006e1','a0000000-0000-0000-0000-0000000006e2');
          DELETE FROM employee WHERE id IN ('a0000000-0000-0000-0000-0000000006e1','a0000000-0000-0000-0000-0000000006e2');
          SQL"
          echo "cleanup done"
