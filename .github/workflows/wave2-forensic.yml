name: Wave2 Data Integrity Forensic (read-only)

# Wave 2 (Kira 2026-07-13): THE highest-priority question — did the ingest ever
# MERGE two different people on a shared payroll number? Every query is a
# SELECT. Sentinel: .github/RUN-WAVE2.
on:
  workflow_dispatch:
  push:
    branches: [claude/nifty-goodall-poihi4]
    paths: ['.github/RUN-WAVE2']

concurrency: { group: wave2, cancel-in-progress: false }

jobs:
  forensic:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      UAT_IP: 152.239.121.249
      UAT_CO: 11111111-1111-1111-1111-111111111111
    steps:
      - uses: actions/checkout@v4
      - name: SSH path — tunnel first, direct fallback
        env:
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          mkdir -p ~/.ssh && printf '%s\n' "${{ secrets.UAT_SSH_PRIVATE_KEY }}" > ~/.ssh/uat && chmod 600 ~/.ssh/uat
          sudo curl -sSL -o /usr/local/bin/cloudflared \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 \
            && sudo chmod +x /usr/local/bin/cloudflared || true
          cat > ~/.ssh/config <<EOF
          Host uat-tunnel
            HostName ssh.uat.taifamining.tz
            User root
            IdentityFile ~/.ssh/uat
            StrictHostKeyChecking accept-new
            ProxyCommand /usr/local/bin/cloudflared access ssh --hostname %h --service-token-id $CF_ACCESS_CLIENT_ID --service-token-secret $CF_ACCESS_CLIENT_SECRET
          Host uat-direct
            HostName $UAT_IP
            User root
            IdentityFile ~/.ssh/uat
            StrictHostKeyChecking accept-new
            ConnectTimeout 10
          EOF
          chmod 600 ~/.ssh/config
          if timeout 30 ssh uat-tunnel true 2>/dev/null; then echo uat-tunnel > /tmp/ssh_host; echo tunnel; exit 0; fi
          for i in $(seq 1 100); do
            ssh uat-direct true 2>/dev/null && { echo uat-direct > /tmp/ssh_host; echo direct; exit 0; }
            echo "waiting ($i/100)"; sleep 15
          done
          echo FATAL; exit 1

      - name: 2.2/2.4/2.5 — merge-damage + TIN uniqueness + headcount (SELECT only)
        run: |
          SSH="ssh $(cat /tmp/ssh_host)"
          $SSH "sudo -u postgres psql -d hcmos <<'SQL'
          \echo ── 2.5 real headcount: total employee rows + active ──
          SELECT count(*) AS total_rows, count(*) FILTER (WHERE status='active') AS active FROM employee WHERE company_id='$UAT_CO';
          \echo ── 2.2 CRITICAL: every payroll number shared by MORE THAN ONE ROW — one row or two? ──
          SELECT legacy_id AS pf, count(*) AS rows,
                 count(DISTINCT site_id) AS distinct_sites,
                 count(DISTINCT lower(full_name)) AS distinct_names,
                 array_agg(DISTINCT left(full_name,1)||'…') AS name_initials,
                 bool_or(emp_no IS NULL) AS any_empno_null
            FROM employee WHERE company_id='$UAT_CO' AND legacy_id IS NOT NULL
           GROUP BY legacy_id HAVING count(*) > 1
           ORDER BY count(*) DESC, legacy_id;
          \echo ── 2.2 THE MERGE ZONE: same PF, SAME site, MORE THAN ONE ROW (would mean two people at one site) ──
          SELECT legacy_id AS pf, site_id, count(*) AS rows_at_same_site
            FROM employee WHERE company_id='$UAT_CO' AND legacy_id IS NOT NULL
           GROUP BY legacy_id, site_id HAVING count(*) > 1;
          \echo ── 2.2 counts: PFs shared across sites (distinct people, separate rows = NO merge) ──
          SELECT count(*) AS pfs_shared_across_sites FROM (
            SELECT legacy_id FROM employee WHERE company_id='$UAT_CO' AND legacy_id IS NOT NULL
             GROUP BY legacy_id HAVING count(DISTINCT site_id) > 1) x;
          \echo ── 2.3 TIN as the new key: filled? distinct? any duplicate TIN (two people, one TIN)? ──
          SELECT count(*) AS total_pay_rows,
                 count(tin) FILTER (WHERE tin IS NOT NULL AND btrim(tin)<>'') AS tin_filled,
                 count(DISTINCT tin) FILTER (WHERE tin IS NOT NULL AND btrim(tin)<>'') AS tin_distinct
            FROM employee_pay WHERE company_id='$UAT_CO';
          SELECT tin, count(*) AS shared_by FROM employee_pay
           WHERE company_id='$UAT_CO' AND tin IS NOT NULL AND btrim(tin)<>''
           GROUP BY tin HAVING count(*) > 1 ORDER BY count(*) DESC LIMIT 20;
          \echo ── 2.4 capacity: contract types present (can it hold 'Specific Task'?) ──
          SELECT coalesce(employment_type,'(null)') AS employment_type, count(*)
            FROM employee WHERE company_id='$UAT_CO' GROUP BY employment_type ORDER BY count(*) DESC;
          \echo ── 2.4 expats currently flagged (system knows 4; Taifa has 31) ──
          SELECT count(*) FILTER (WHERE is_expat) AS is_expat_true, count(*) AS total FROM employee WHERE company_id='$UAT_CO';
          \echo ── column types (proves text = no precision loss / free contract type) ──
          SELECT table_name, column_name, data_type FROM information_schema.columns
           WHERE table_schema='public' AND ((table_name='employee' AND column_name IN ('employment_type','is_expat','legacy_id','emp_no'))
              OR (table_name='employee_pay' AND column_name IN ('tin','national_id','passport_number')))
           ORDER BY table_name, column_name;
          SQL"
