name: UAT Smoke Test

# Kira's comprehensive UAT smoke test (2026-07-12): executed from the runner as
# a REAL HTTPS client through the Cloudflare tunnel (never loopback). SSH is
# used ONLY to fetch credentials/inputs (read-only) and the C7 audit evidence —
# every assertion travels the edge. Report-only: no deploy, no restart, no fix.
on:
  workflow_dispatch:
    inputs:
      base_url:
        description: Public base URL through the tunnel
        default: https://uat.taifamining.tz
        required: true
  push:
    branches: [claude/nifty-goodall-poihi4]
    paths: ['.github/RUN-SMOKE']

concurrency:
  group: uat-smoke
  cancel-in-progress: false

jobs:
  smoke:
    name: Smoke over the tunnel (report-only)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      UAT_IP: 152.239.121.249
      UAT_CO: 11111111-1111-1111-1111-111111111111
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }

      - name: Tunnel liveness + Access diagnosis (SSH-independent)
        env:
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          BASE="${{ inputs.base_url || 'https://uat.taifamining.tz' }}"
          echo "── no token (a stranger's browser): raw status without following redirects"
          curl -sS -m 15 -o /dev/null -D - "$BASE/health" | sed -n '1p;/^location:/Ip;/^cf-/Ip' || true
          echo "── WITH service token: raw status without following redirects"
          curl -sS -m 15 -o /tmp/h-tok.json -D /tmp/h-tok.hdr \
            -H "CF-Access-Client-Id: $CF_ACCESS_CLIENT_ID" \
            -H "CF-Access-Client-Secret: $CF_ACCESS_CLIENT_SECRET" \
            "$BASE/health" || true
          sed -n '1p;/^location:/Ip;/^cf-/Ip' /tmp/h-tok.hdr
          echo "body: $(head -c 200 /tmp/h-tok.json)"
          echo "(302 + location to cloudflareaccess.com login = the token did not match any Service Auth policy on THIS application; 200 JSON = edge cleared)"

      - name: SSH key + reachability (fetch-only; port 22 flaps in ~10-15 min windows — same ~25 min patience as deploys)
        run: |
          mkdir -p ~/.ssh && printf '%s\n' "${{ secrets.UAT_SSH_PRIVATE_KEY }}" > ~/.ssh/uat && chmod 600 ~/.ssh/uat
          for i in $(seq 1 100); do
            ssh -i ~/.ssh/uat -o StrictHostKeyChecking=accept-new -o ConnectTimeout=10 "root@$UAT_IP" true && exit 0
            echo "ssh not reachable yet (attempt $i/100)"; sleep 15
          done
          echo "FATAL: box unreachable over SSH for ~25 min — cannot fetch credentials"; exit 1

      - name: Fetch credentials + read-only inputs (never printed)
        run: |
          SSH="ssh -i $HOME/.ssh/uat -o StrictHostKeyChecking=accept-new -o ConnectTimeout=10 root@$UAT_IP"
          $SSH 'cat /root/uat-credentials.txt' > /tmp/creds && chmod 600 /tmp/creds
          echo "creds fetched: $(wc -l < /tmp/creds) lines (content never echoed)"
          $SSH "sudo -u postgres psql -d hcmos -Atc \"
            SELECT json_build_object(
              'run_stamp', extract(epoch from now())::bigint,
              'sites', (SELECT json_agg(json_build_object('id', s.id, 'name', s.name,
                  'employees', (SELECT count(*) FROM employee e WHERE e.site_id=s.id),
                  'master_loaded', (SELECT count(*) FROM employee e WHERE e.site_id=s.id AND e.position IS NOT NULL),
                  'opening_rows', (SELECT count(DISTINCT lc.employee_id) FROM leave_carry lc
                                    JOIN employee e2 ON e2.id=lc.employee_id
                                   WHERE e2.site_id=s.id AND lc.opening_bucket)) ORDER BY s.name)
                 FROM site s WHERE s.company_id='$UAT_CO'),
              'dup_pf_people', (SELECT count(*) FROM (SELECT legacy_id FROM employee
                 WHERE company_id='$UAT_CO' AND legacy_id IS NOT NULL
                 GROUP BY legacy_id HAVING count(DISTINCT site_id) > 1) g),
              'dup_pf_no_empno', (SELECT count(*) FROM employee
                 WHERE company_id='$UAT_CO' AND emp_no IS NULL AND legacy_id IN
                   (SELECT legacy_id FROM employee WHERE company_id='$UAT_CO' AND legacy_id IS NOT NULL
                     GROUP BY legacy_id HAVING count(DISTINCT site_id) > 1)),
              'expats', (SELECT coalesce(json_agg(json_build_object('id', e.id, 'site', s.name,
                  'permits', (SELECT count(*) FROM employee_document d
                               WHERE d.employee_id=e.id AND d.kind='permit'))), '[]'::json)
                 FROM employee e JOIN site s ON s.id=e.site_id
                WHERE e.company_id='$UAT_CO' AND e.is_expat),
              'sample', json_build_object(
                'mwadui_emp', (SELECT e.id FROM employee e JOIN site s ON s.id=e.site_id
                                 JOIN employee_pay p ON p.employee_id=e.id
                                WHERE s.name='Mwadui' AND e.position IS NOT NULL
                                  AND p.bank_account IS NOT NULL LIMIT 1),
                'ho_emp', (SELECT e.id FROM employee e JOIN site s ON s.id=e.site_id
                            WHERE s.name='Head Office' AND e.position IS NOT NULL LIMIT 1)),
              'officer_emp', json_build_object(
                'yusuph', (SELECT u.employee_id FROM app_user u
                            WHERE u.company_id='$UAT_CO' AND u.email='yusuph.kabeza@taifamining.tz')),
              'earliest_permit_expiry', (SELECT min(valid_until)::text FROM employee_document
                 WHERE company_id='$UAT_CO' AND kind='permit'))
          \"" > /tmp/inputs.json
          node -e "JSON.parse(require('fs').readFileSync('/tmp/inputs.json','utf8')); console.log('inputs.json parses OK')"

      - name: Smoke test over HTTPS (the tunnel)
        env:
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: node scripts/uat-smoke.js "${{ inputs.base_url || 'https://uat.taifamining.tz' }}" /tmp/creds /tmp/inputs.json

      - name: C7 audit evidence (read-only; actors masked to local-part)
        if: always()
        run: |
          SSH="ssh -i $HOME/.ssh/uat -o StrictHostKeyChecking=accept-new -o ConnectTimeout=10 root@$UAT_IP"
          echo "audit rows written in the last 30 minutes (action, actor role, masked actor, count):"
          $SSH "sudo -u postgres psql -d hcmos -c \"
            SELECT action, role, split_part(actor,'@',1) AS actor_local, count(*)
              FROM audit
             WHERE company_id='$UAT_CO' AND ts > now() - interval '30 minutes'
             GROUP BY 1,2,3 ORDER BY max(ts) DESC LIMIT 40\""
