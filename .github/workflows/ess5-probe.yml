name: ESS-5 Probe (clock-out + sync-conflict resolution, live over HTTPS)

# ESS-5 (E3 completed), Kira 2026-07-14. Clock-out closes an OPEN shift only,
# and the offline sync-conflict flow resolves the reference's one named kind —
# "Duplicate clock-in — two open punches with no clock-out between them" —
# as keep-device / keep-server / keep-both, AUDITED (UNI-06), server the
# source of truth. Seeds a throwaway worker + device at a GEOFENCED site,
# then proves over HTTPS with raw bodies:
#   • status answers off-shift; clock-in inside the zone accepts and names it;
#   • a second clock-in (the queued punch replaying) → 409 carrying the SERVER
#     version — nothing recorded;
#   • resolve keep_both → both punches stand, BOTH rows flagged
#     'conflict — timekeeper review' (verified in the DB);
#   • the queued punch replaying AFTER the decision DEDUPES (never re-conflicts);
#   • the decision extended the audit chain (attendance.conflict.keep_both);
#   • clock-out closes the shift; a second clock-out is the honest 409
#     'not clocked in'; status reads closed;
#   • the served bundle carries the conflict strings in BOTH languages
#     ("Keep both · flag for timekeeper" / "Weka zote · arifu mhasibu wa muda"
#     and "Clock out now" / "Toka kazini sasa").
# Cleanup removes attendance, idempotency keys, sessions, device, employee.
# Chain + BUILD_SHA at start and end. Sentinel: .github/RUN-ESS5.
on:
  workflow_dispatch:
  push:
    branches: [claude/nifty-goodall-poihi4]
    paths: ['.github/RUN-ESS5']

concurrency: { group: ess5, cancel-in-progress: false }

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      UAT_IP: 152.239.121.249
      UAT_CO: 11111111-1111-1111-1111-111111111111
      BASE: https://uat.taifamining.tz
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - name: SSH path — tunnel first, direct fallback
        env:
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          mkdir -p ~/.ssh && printf '%s\n' "${{ secrets.UAT_SSH_PRIVATE_KEY }}" > ~/.ssh/uat && chmod 600 ~/.ssh/uat
          sudo curl -sSL -o /usr/local/bin/cloudflared \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 \
            && sudo chmod +x /usr/local/bin/cloudflared || true
          cat > ~/.ssh/config <<EOF
          Host uat-tunnel
            HostName ssh.uat.taifamining.tz
            User root
            IdentityFile ~/.ssh/uat
            StrictHostKeyChecking accept-new
            ProxyCommand /usr/local/bin/cloudflared access ssh --hostname %h --service-token-id $CF_ACCESS_CLIENT_ID --service-token-secret $CF_ACCESS_CLIENT_SECRET
          Host uat-direct
            HostName $UAT_IP
            User root
            IdentityFile ~/.ssh/uat
            StrictHostKeyChecking accept-new
            ConnectTimeout 10
          EOF
          chmod 600 ~/.ssh/config
          if timeout 30 ssh uat-tunnel true 2>/dev/null; then echo uat-tunnel > /tmp/ssh_host; exit 0; fi
          for i in $(seq 1 60); do
            ssh uat-direct true 2>/dev/null && { echo uat-direct > /tmp/ssh_host; exit 0; }
            echo "waiting ($i/60)"; sleep 15
          done
          echo FATAL; exit 1

      - name: BUILD_SHA START + seed worker + device at a GEOFENCED site
        run: |
          SSH="ssh $(cat /tmp/ssh_host)"
          echo "── BUILD_SHA (running process) at START of ESS-5 ──"
          $SSH "curl -fsS http://127.0.0.1:3000/health 2>/dev/null; echo; cat /opt/hcmos/BUILD_SHA 2>/dev/null | head -c 40; echo"
          $SSH "cd /opt/hcmos && set -a && . /etc/hcmos/hcmos.env && set +a && node -e '
            const db=require(\"./src/db\"), C=require(\"./src/crypto\");
            const CO=\"$UAT_CO\";
            (async()=>{ const out={};
              await db.withOwner(async c=>{
                const z=(await c.query(\"SELECT site_id, name, center_lat, center_lng FROM geofence_zone WHERE company_id=\$1 ORDER BY name LIMIT 1\",[CO])).rows[0];
                if(!z){ console.error(\"no geofence zone for tenant — cannot probe attendance\"); process.exit(1); }
                out.zone=z.name; out.lat=Number(z.center_lat); out.lng=Number(z.center_lng);
                out.emp=(await c.query(\"INSERT INTO employee(id,company_id,site_id,full_name,role_code,status,is_expat) VALUES(gen_random_uuid(),\$1,\$2,\x27Zz ESS5 Probe\x27,\x27R13\x27,\x27active\x27,false) RETURNING id\",[CO,z.site_id])).rows[0].id;
                out.dev=(await c.query(\"INSERT INTO device(company_id,employee_id,pin_hash,status) VALUES(\$1,\$2,\$3,\x27active\x27) RETURNING id\",[CO,out.emp,C.hashSecret(\"440055\")])).rows[0].id;
              });
              require(\"fs\").writeFileSync(\"/root/ess5.json\",JSON.stringify(out));
              console.log(\"seeded\",JSON.stringify(out)); await db.close();
            })().catch(e=>{console.error(e.message);process.exit(1);});
          '"
          $SSH 'cat /root/ess5.json' > /tmp/ess5.json

      - name: ESS-5 live over HTTPS (raw bodies)
        env:
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          node - <<'EOF'
          const Z = require('/tmp/ess5.json');
          const CF = { 'CF-Access-Client-Id': process.env.CF_ACCESS_CLIENT_ID, 'CF-Access-Client-Secret': process.env.CF_ACCESS_CLIENT_SECRET };
          const BASE = process.env.BASE;
          const call = async (method, path, body, token) => {
            const headers = { ...CF };
            if (token) headers.authorization = `Bearer ${token}`;
            if (body !== undefined) headers['content-type'] = 'application/json';
            const r = await fetch(BASE+path,{method,headers,body:body!==undefined?JSON.stringify(body):undefined,signal:AbortSignal.timeout(20000)});
            let d=null; try{d=await r.json();}catch{} return {status:r.status, body:d||{}};
          };
          let fail=false; const say=(ok,n,det)=>{ if(!ok)fail=true; console.log(`${ok?'PASS':'FAIL'}  ${n} — ${det}`); };
          (async () => {
            const at = { lat: Z.lat, lng: Z.lng, accuracy: 5 };
            const KEY = 'ess5-probe-queued-1';
            const login = await call('POST','/auth/field',{ device_id: Z.dev, pin: '440055' });
            say(login.status===200 && !!login.body.token, 'R13 field login', `${login.status}`);
            const tok = login.body.token;

            const s0 = await call('GET','/attendance/status',undefined,tok);
            say(s0.status===200 && s0.body.open===false,
                'status: off shift before any punch', `${s0.status} raw=${JSON.stringify(s0.body)}`);

            const inn = await call('POST','/attendance/clock-in',at,tok);
            say(inn.status===200 && inn.body.accepted===true && !!inn.body.zone,
                'clock-in inside the zone accepts and names it', `${inn.status} raw=${JSON.stringify(inn.body)}`);
            const serverId = inn.body.attendance_id;

            // The queued offline punch replays → the duplicate clock-in conflict.
            const dup = await call('POST','/attendance/clock-in',{...at, idempotency_key: KEY},tok);
            say(dup.status===409 && dup.body.conflict && dup.body.conflict.kind==='duplicate-clock-in'
                && dup.body.conflict.server && dup.body.conflict.server.attendance_id===serverId,
                'replayed punch → 409 conflict carrying the SERVER version, nothing recorded',
                `${dup.status} raw=${JSON.stringify(dup.body)}`);

            // Keep both — the reference's "Keep both · flag for timekeeper".
            const res = await call('POST','/attendance/conflicts/resolve',{
              resolution:'keep_both', server_attendance_id: serverId,
              device: {...at, idempotency_key: KEY, queued_at: new Date().toISOString()} },tok);
            say(res.status===200 && res.body.resolved===true && res.body.flagged==='conflict — timekeeper review',
                'resolve keep_both → both punches stand, flagged for the timekeeper',
                `${res.status} raw=${JSON.stringify(res.body)}`);

            // The phone's queue replays once more before dropping the item —
            // it must DEDUPE to the decision, never re-conflict.
            const replay = await call('POST','/attendance/clock-in',{...at, idempotency_key: KEY},tok);
            say(replay.status===200 && replay.body.deduped===true,
                'post-decision replay DEDUPES (idempotency claimed by the resolution)',
                `${replay.status} raw=${JSON.stringify(replay.body)}`);

            // Shift close — then the honest empty state on a second close.
            const out = await call('POST','/attendance/clock-out',at,tok);
            say(out.status===200 && out.body.direction==='out' && !!out.body.since,
                'clock-out closes the OPEN shift and reports when it opened',
                `${out.status} raw=${JSON.stringify(out.body)}`);
            const again = await call('POST','/attendance/clock-out',at,tok);
            say(again.status===409 && again.body.error==='not clocked in',
                'second clock-out → 409 not clocked in (the reference empty state)',
                `${again.status} raw=${JSON.stringify(again.body)}`);
            const s1 = await call('GET','/attendance/status',undefined,tok);
            say(s1.status===200 && s1.body.open===false,
                'status: books closed after clock-out', `${s1.status} raw=${JSON.stringify(s1.body)}`);

            // Bundle carries the conflict UI strings in BOTH languages.
            const shellR = await fetch(BASE+'/login',{headers:CF,signal:AbortSignal.timeout(20000)});
            const shell = await shellR.text();
            const js = (shell.match(/src="(\/assets\/[^"]+\.js)"/)||[])[1];
            let en=false, sw=false;
            if (js) {
              const bundle = await (await fetch(BASE+js,{headers:CF,signal:AbortSignal.timeout(30000)})).text();
              en = bundle.includes('Keep both · flag for timekeeper') && bundle.includes('Clock out now');
              sw = bundle.includes('Weka zote · arifu mhasibu wa muda') && bundle.includes('Toka kazini sasa');
            }
            say(en && sw, 'served bundle: conflict + clock-out strings in EN and SW', `bundle=${js||'NOT FOUND'} en=${en} sw=${sw}`);
            process.exit(fail?1:0);
          })().catch(e=>{console.error('PROBE ERROR:',e.message);process.exit(1);});
          EOF

      - name: on-box evidence — flagged rows + UNI-06 audit entry
        run: |
          SSH="ssh $(cat /tmp/ssh_host)"
          EMP=$(python3 -c "import json;print(json.load(open('/tmp/ess5.json'))['emp'])")
          echo "── attendance rows for the probe worker (both flagged, one 'out') ──"
          $SSH "sudo -u postgres psql -d hcmos -c \"
            SELECT direction, via, review_flag, superseded_by IS NOT NULL AS superseded
              FROM attendance WHERE employee_id='$EMP' ORDER BY punched_at\""
          echo "── the decision on the audit chain ──"
          $SSH "sudo -u postgres psql -d hcmos -c \"
            SELECT action, actor, role, after->>'kept' AS kept FROM audit
             WHERE company_id='$UAT_CO' AND action='attendance.conflict.keep_both'
               AND entity_id IN (SELECT id::text FROM attendance WHERE employee_id='$EMP')\""
          FLAGGED=$($SSH "sudo -u postgres psql -d hcmos -tA -c \"SELECT count(*) FROM attendance WHERE employee_id='$EMP' AND review_flag='conflict — timekeeper review'\"")
          AUDITED=$($SSH "sudo -u postgres psql -d hcmos -tA -c \"SELECT count(*) FROM audit WHERE company_id='$UAT_CO' AND action='attendance.conflict.keep_both' AND entity_id IN (SELECT id::text FROM attendance WHERE employee_id='$EMP')\"")
          echo "flagged_rows=$FLAGGED audited_decisions=$AUDITED"
          [ "$FLAGGED" = "2" ] && [ "$AUDITED" = "1" ] || { echo "FAIL on-box evidence"; exit 1; }
          echo "PASS  keep_both flagged BOTH rows + the decision extended the audit chain"

      - name: audit chain + BUILD_SHA END + cleanup
        if: always()
        run: |
          SSH="ssh $(cat /tmp/ssh_host)"
          EMP=$(python3 -c "import json;print(json.load(open('/tmp/ess5.json'))['emp'])" 2>/dev/null || echo '')
          if [ -n "$EMP" ]; then
            $SSH "sudo -u postgres psql -d hcmos -c \"
              DELETE FROM idempotency WHERE key LIKE 'att:$EMP:%';
              DELETE FROM attendance WHERE employee_id='$EMP';
              DELETE FROM session WHERE device_id IN (SELECT id FROM device WHERE employee_id='$EMP');
              DELETE FROM device WHERE employee_id='$EMP';
              DELETE FROM employee WHERE id='$EMP';\""
          fi
          echo "── audit chain: head + recompute + linkage ──"
          $SSH "sudo -u postgres psql -d hcmos -c \"
            SELECT (SELECT max(seq) FROM audit WHERE company_id='$UAT_CO') AS head_seq,
                   bool_and(hash = encode(sha256(convert_to(prev_hash || concat_ws('|',
                     company_id::text, coalesce(actor,''), coalesce(role,''), action,
                     coalesce(entity,''), coalesce(entity_id,''), ts::text,
                     coalesce(before::text,''), coalesce(after::text,'')), 'UTF8')),'hex')) AS recompute_ok
              FROM audit WHERE company_id='$UAT_CO';
            SELECT count(*) AS linkage_breaks FROM (
              SELECT prev_hash, lag(hash) OVER (PARTITION BY company_id ORDER BY seq) AS expect FROM audit) x
             WHERE (expect IS NULL AND prev_hash <> repeat('0',64)) OR (expect IS NOT NULL AND prev_hash <> expect)\""
          echo "── BUILD_SHA END ──"
          $SSH "curl -fsS http://127.0.0.1:3000/health 2>/dev/null; echo; cat /opt/hcmos/BUILD_SHA 2>/dev/null | head -c 40; echo"
