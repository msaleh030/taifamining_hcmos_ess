name: P1 Field-Login Probe (device+PIN over HTTPS, bilingual bundle served)

# P1 (Kira 2026-07-14): LIVE over HTTPS. Proves, with raw bodies:
#   • a provisioned device + correct PIN signs in (200, token) and the token
#     reaches /me/landing as R13 (the ESS track);
#   • a wrong PIN is a GENERIC 401 (never names the factor — AUTH-04);
#   • the served frontend bundle CONTAINS the Swahili field-login strings (the
#     bilingual ship gate is in the shipped artifact, not just the repo).
# BUILD_SHA start/end; audit chain recompute + linkage; full cleanup (throwaway
# employee + device + sessions). Sentinel: .github/RUN-P1.
on:
  workflow_dispatch:
  push:
    branches: [claude/nifty-goodall-poihi4]
    paths: ['.github/RUN-P1']

concurrency: { group: p1, cancel-in-progress: false }

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      UAT_IP: 152.239.121.249
      UAT_CO: 11111111-1111-1111-1111-111111111111
      BASE: https://uat.taifamining.tz
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - name: SSH path — tunnel first, direct fallback
        env:
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          mkdir -p ~/.ssh && printf '%s\n' "${{ secrets.UAT_SSH_PRIVATE_KEY }}" > ~/.ssh/uat && chmod 600 ~/.ssh/uat
          sudo curl -sSL -o /usr/local/bin/cloudflared \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 \
            && sudo chmod +x /usr/local/bin/cloudflared || true
          cat > ~/.ssh/config <<EOF
          Host uat-tunnel
            HostName ssh.uat.taifamining.tz
            User root
            IdentityFile ~/.ssh/uat
            StrictHostKeyChecking accept-new
            ProxyCommand /usr/local/bin/cloudflared access ssh --hostname %h --service-token-id $CF_ACCESS_CLIENT_ID --service-token-secret $CF_ACCESS_CLIENT_SECRET
          Host uat-direct
            HostName $UAT_IP
            User root
            IdentityFile ~/.ssh/uat
            StrictHostKeyChecking accept-new
            ConnectTimeout 10
          EOF
          chmod 600 ~/.ssh/config
          if timeout 30 ssh uat-tunnel true 2>/dev/null; then echo uat-tunnel > /tmp/ssh_host; exit 0; fi
          for i in $(seq 1 100); do
            ssh uat-direct true 2>/dev/null && { echo uat-direct > /tmp/ssh_host; exit 0; }
            echo "waiting ($i/100)"; sleep 15
          done
          echo FATAL; exit 1

      - name: BUILD_SHA START + seed throwaway employee + device (known PIN)
        run: |
          SSH="ssh $(cat /tmp/ssh_host)"
          echo "── BUILD_SHA (running process) at START of P1 ──"
          $SSH "curl -fsS http://127.0.0.1:3000/health 2>/dev/null; echo; cat /opt/hcmos/BUILD_SHA 2>/dev/null | head -c 40; echo"
          $SSH "cd /opt/hcmos && set -a && . /etc/hcmos/hcmos.env && set +a && node -e '
            const db=require(\"./src/db\"), C=require(\"./src/crypto\");
            const CO=\"$UAT_CO\";
            (async()=>{ const out={};
              await db.withOwner(async c=>{
                const site=(await c.query(\"SELECT id FROM site WHERE company_id=\$1 ORDER BY id LIMIT 1\",[CO])).rows[0].id;
                out.emp=(await c.query(\"INSERT INTO employee(id,company_id,site_id,full_name,role_code,status,is_expat) VALUES(gen_random_uuid(),\$1,\$2,\x27Zz P1 Probe\x27,\x27R13\x27,\x27active\x27,false) RETURNING id\",[CO,site])).rows[0].id;
                out.dev=(await c.query(\"INSERT INTO device(company_id,employee_id,pin_hash,status) VALUES(\$1,\$2,\$3,\x27active\x27) RETURNING id\",[CO,out.emp,C.hashSecret(\"736271\")])).rows[0].id;
              });
              require(\"fs\").writeFileSync(\"/root/p1.json\",JSON.stringify(out));
              console.log(\"seeded device\",out.dev); await db.close();
            })().catch(e=>{console.error(e.message);process.exit(1);});
          '"
          $SSH 'cat /root/p1.json' > /tmp/p1.json

      - name: P1 — field login over HTTPS (raw bodies) + Swahili in the served bundle
        env:
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          node - <<'EOF'
          const Z = require('/tmp/p1.json');
          const CF = { 'CF-Access-Client-Id': process.env.CF_ACCESS_CLIENT_ID, 'CF-Access-Client-Secret': process.env.CF_ACCESS_CLIENT_SECRET };
          const BASE = process.env.BASE;
          const call = async (method, path, body, token) => {
            const headers = { ...CF };
            if (token) headers.authorization = `Bearer ${token}`;
            if (body !== undefined) headers['content-type'] = 'application/json';
            const r = await fetch(BASE+path,{method,headers,body:body!==undefined?JSON.stringify(body):undefined,signal:AbortSignal.timeout(20000)});
            let d=null; try{d=await r.json();}catch{} return {status:r.status, body:d||{}};
          };
          let fail=false; const say=(ok,n,det)=>{ if(!ok)fail=true; console.log(`${ok?'PASS':'FAIL'}  ${n} — ${det}`); };
          (async () => {
            // Wrong PIN: GENERIC 401 — never names the factor (AUTH-04).
            const bad = await call('POST','/auth/field',{ device_id: Z.dev, pin: '000000' });
            say(bad.status===401 && !/pin|device/i.test(JSON.stringify(bad.body)),
                'wrong PIN → generic 401 (no factor named)', `${bad.status} raw=${JSON.stringify(bad.body)}`);
            // Correct PIN: 200 + token; the ESS track opens.
            const ok = await call('POST','/auth/field',{ device_id: Z.dev, pin: '736271' });
            say(ok.status===200 && !!ok.body.token && ok.body.role==='R13',
                'device + PIN → 200, R13 token minted', `${ok.status} role=${ok.body.role} route=${ok.body.route||''}`);
            // The token is a real session: /me/landing answers as R13.
            const land = await call('GET','/me/landing',undefined,ok.body.token);
            say(land.status===200 && land.body.role==='R13',
                'token reaches /me/landing as R13', `${land.status} raw=${JSON.stringify(land.body).slice(0,140)}`);
            // Bilingual gate IN THE SHIPPED ARTIFACT: the served JS bundle carries
            // the Swahili field-login strings (locales are compiled into the bundle).
            const shellR = await fetch(BASE+'/login',{headers:CF,signal:AbortSignal.timeout(20000)});
            const shell = await shellR.text();
            const js = (shell.match(/src="(\/assets\/[^"]+\.js)"/)||[])[1];
            let hasSw = false, hasEn = false;
            if (js) {
              const bundle = await (await fetch(BASE+js,{headers:CF,signal:AbortSignal.timeout(30000)})).text();
              hasSw = bundle.includes('Ingia kwa PIN'); hasEn = bundle.includes('Sign in with PIN');
            }
            say(hasSw && hasEn, 'served bundle carries BOTH "Sign in with PIN" and "Ingia kwa PIN"',
                `bundle=${js||'NOT FOUND'} en=${hasEn} sw=${hasSw}`);
            process.exit(fail?1:0);
          })().catch(e=>{console.error('PROBE ERROR:',e.message);process.exit(1);});
          EOF

      - name: audit chain + BUILD_SHA END + cleanup
        if: always()
        run: |
          SSH="ssh $(cat /tmp/ssh_host)"
          echo "── audit chain: head + recompute + linkage (auth.field rows are forward-only) ──"
          $SSH "sudo -u postgres psql -d hcmos -c \"
            SELECT (SELECT max(seq) FROM audit WHERE company_id='$UAT_CO') AS head_seq,
                   bool_and(hash = encode(sha256(convert_to(prev_hash || concat_ws('|',
                     company_id::text, coalesce(actor,''), coalesce(role,''), action,
                     coalesce(entity,''), coalesce(entity_id,''), ts::text,
                     coalesce(before::text,''), coalesce(after::text,'')), 'UTF8')),'hex')) AS recompute_ok
              FROM audit WHERE company_id='$UAT_CO';
            SELECT count(*) AS linkage_breaks FROM (
              SELECT prev_hash, lag(hash) OVER (PARTITION BY company_id ORDER BY seq) AS expect FROM audit) x
             WHERE (expect IS NULL AND prev_hash <> repeat('0',64)) OR (expect IS NOT NULL AND prev_hash <> expect)\""
          echo "── BUILD_SHA END ──"
          $SSH "curl -fsS http://127.0.0.1:3000/health 2>/dev/null; echo; cat /opt/hcmos/BUILD_SHA 2>/dev/null | head -c 40; echo"
          echo "── cleanup: throwaway sessions, device, employee ──"
          $SSH "cd /opt/hcmos && set -a && . /etc/hcmos/hcmos.env && set +a && node -e '
            const db=require(\"./src/db\");
            (async()=>{ const Z=require(\"/root/p1.json\");
              await db.withOwner(async c=>{
                await c.query(\"DELETE FROM session WHERE device_id=\$1\",[Z.dev]);
                await c.query(\"DELETE FROM device WHERE id=\$1\",[Z.dev]);
                await c.query(\"DELETE FROM employee WHERE id=\$1\",[Z.emp]);
              });
              await db.close(); console.log(\"cleanup done\");
            })().catch(e=>{console.error(e.message);});
          '"
          $SSH "rm -f /root/p1.json"
