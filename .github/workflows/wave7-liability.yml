name: Wave7 Liability + Terminal-dues Probe

# Wave 7 (2026-07-14): LIVE over HTTPS. Seeds a throwaway matched Exact batch,
# then proves: the leave-liability engine returns a real figure (10 days × base
# 3000/30 = 1000); the terminal/severance register BLOCKS with 409 while the
# statutory rate is PENDING (never a guessed figure); and a financial-register
# read writes a register.read audit row. Removes every trace. Sentinel:
# .github/RUN-WAVE7.
on:
  workflow_dispatch:
  push:
    branches: [claude/nifty-goodall-poihi4]
    paths: ['.github/RUN-WAVE7']

concurrency: { group: wave7, cancel-in-progress: false }

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      UAT_IP: 152.239.121.249
      UAT_CO: 11111111-1111-1111-1111-111111111111
      BASE: https://uat.taifamining.tz
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - name: SSH path — tunnel first, direct fallback
        env:
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          mkdir -p ~/.ssh && printf '%s\n' "${{ secrets.UAT_SSH_PRIVATE_KEY }}" > ~/.ssh/uat && chmod 600 ~/.ssh/uat
          sudo curl -sSL -o /usr/local/bin/cloudflared \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 \
            && sudo chmod +x /usr/local/bin/cloudflared || true
          cat > ~/.ssh/config <<EOF
          Host uat-tunnel
            HostName ssh.uat.taifamining.tz
            User root
            IdentityFile ~/.ssh/uat
            StrictHostKeyChecking accept-new
            ProxyCommand /usr/local/bin/cloudflared access ssh --hostname %h --service-token-id $CF_ACCESS_CLIENT_ID --service-token-secret $CF_ACCESS_CLIENT_SECRET
          Host uat-direct
            HostName $UAT_IP
            User root
            IdentityFile ~/.ssh/uat
            StrictHostKeyChecking accept-new
            ConnectTimeout 10
          EOF
          chmod 600 ~/.ssh/config
          if timeout 30 ssh uat-tunnel true 2>/dev/null; then echo uat-tunnel > /tmp/ssh_host; echo tunnel; exit 0; fi
          for i in $(seq 1 100); do
            ssh uat-direct true 2>/dev/null && { echo uat-direct > /tmp/ssh_host; echo direct; exit 0; }
            echo "waiting ($i/100)"; sleep 15
          done
          echo FATAL; exit 1

      - name: BUILD_SHA START + statutory rate PENDING + seed throwaway matched batch
        run: |
          SSH="ssh $(cat /tmp/ssh_host)"
          echo "── BUILD_SHA (running process) at START of Wave 7 ──"
          $SSH "curl -fsS http://127.0.0.1:3000/health 2>/dev/null; echo; cat /opt/hcmos/BUILD_SHA 2>/dev/null | head -c 40; echo"
          echo "── registry: the statutory severance rate ships PENDING (migration 036) → terminal register must BLOCK ──"
          $SSH "sudo -u postgres psql -d hcmos -c \"SELECT key,value FROM config WHERE company_id='$UAT_CO' AND key IN ('terminal.severance.days_per_year','terminal.min_service_years','payroll.daily_rate.divisor') ORDER BY key\""
          $SSH "cd /opt/hcmos && set -a && . /etc/hcmos/hcmos.env && set +a && node -e '
            const db=require(\"./src/db\"), C=require(\"./src/crypto\"), contract=require(\"./src/exact_contract\");
            const CO=\"$UAT_CO\"; const N=contract.build().length;
            (async()=>{ const out={};
              await db.withOwner(async c=>{
                const u=(await c.query(\"SELECT id FROM app_user WHERE company_id=\$1 AND role_code=\x27R07\x27 AND status=\x27active\x27 ORDER BY email LIMIT 1\",[CO])).rows[0];
                const t=C.newToken();
                out.sid=(await c.query(\"INSERT INTO session(company_id,user_id,role_code,token_hash,expires_at) VALUES(\$1,\$2,\x27R07\x27,\$3,now()+interval \x271 hour\x27) RETURNING id\",[CO,u.id,C.tokenHash(t)])).rows[0].id;
                const site=(await c.query(\"SELECT id FROM site WHERE company_id=\$1 ORDER BY id LIMIT 1\",[CO])).rows[0].id;
                out.emp=(await c.query(\"INSERT INTO employee(id,company_id,site_id,full_name,role_code,status,is_expat,joined_at) VALUES(gen_random_uuid(),\$1,\$2,\x27Zz W7 Probe\x27,\x27R01\x27,\x27active\x27,false,\x272023-01-01\x27) RETURNING id\",[CO,site])).rows[0].id;
                out.batch=(await c.query(\"INSERT INTO exact_batch(company_id,period,file_hash,version,status,row_count) VALUES(\$1,\x272026-06-w7p\x27,\x27w7p-hash\x27,\x27v1.2\x27,\x27staged\x27,1) RETURNING id\",[CO])).rows[0].id;
                const cells=Array(N).fill(\"0\"); cells[12]=\"3000\";
                await c.query(\"INSERT INTO exact_row(company_id,batch_id,row_no,employee_id_raw,full_name,cells,matched_employee,match_status) VALUES(\$1,\$2,1,\x27x\x27,\x27\x27,\$3,\$4,\x27matched\x27)\",[CO,out.batch,JSON.stringify(cells),out.emp]);
                await c.query(\"INSERT INTO leave_carry(company_id,employee_id,days,carried_for_year) VALUES(\$1,\$2,10,2026)\",[CO,out.emp]);
                out.token=t;
              });
              require(\"fs\").writeFileSync(\"/root/wave7.json\",JSON.stringify(out));
              console.log(\"seeded batch\",out.batch,\"emp\",out.emp);
              await db.close();
            })().catch(e=>{console.error(e.message);process.exit(1);});
          '"
          $SSH 'cat /root/wave7.json' > /tmp/w7.json

      - name: 7.x — leave-liability returns a figure; terminal BLOCKS 409 (raw bodies)
        env:
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          node - <<'EOF'
          const Z = require('/tmp/w7.json');
          const CF = { 'CF-Access-Client-Id': process.env.CF_ACCESS_CLIENT_ID, 'CF-Access-Client-Secret': process.env.CF_ACCESS_CLIENT_SECRET };
          const BASE = process.env.BASE;
          const api = async (path, token) => {
            const headers = { ...CF, authorization: `Bearer ${token}` };
            const r = await fetch(BASE+path,{headers,signal:AbortSignal.timeout(20000)});
            let d=null; try{d=await r.json();}catch{} return {status:r.status, body:d||{}};
          };
          let fail=false; const say=(ok,n,det)=>{ if(!ok)fail=true; console.log(`${ok?'PASS':'FAIL'}  ${n} — ${det}`); };
          (async () => {
            const t=Z.token, b=Z.batch, emp=Z.emp;
            // Leave-liability: 10 outstanding days × (3000/30) = 1000, active, via HTTPS.
            const li = await api(`/liability/batch/${b}`, t);
            const row = (li.body.available||[]).find(a=>a.employee_id===emp);
            say(li.status===200 && row && row.daily_rate===100 && row.liability===1000,
                'leave-liability figure from the single base ÷30', `${li.status} row=${JSON.stringify(row||null)}`);
            // Terminal/severance: BLOCKED — statutory rate is PENDING on the box.
            const td = await api(`/liability/terminal/${b}?asOf=2026-07-14`, t);
            say(td.status===409, 'terminal/severance BLOCKS 409 while statutory rate is PENDING (no guessed figure)',
                `${td.status} raw=${JSON.stringify(td.body).slice(0,140)}`);
            process.exit(fail?1:0);
          })().catch(e=>{console.error('PROBE ERROR:',e.message);process.exit(1);});
          EOF

      - name: register.read audit + chain + BUILD_SHA END + cleanup
        if: always()
        run: |
          SSH="ssh $(cat /tmp/ssh_host)"
          B=$(node -e 'console.log(require("/tmp/w7.json").batch)')
          echo "── register.read audit: the leave-liability disclosure was logged (who/which register) ──"
          $SSH "sudo -u postgres psql -d hcmos -c \"
            SELECT split_part(actor,'@',1) AS who, role, after->>'register' AS register, after->>'lines' AS lines, ts
              FROM audit WHERE company_id='$UAT_CO' AND action='register.read' AND entity_id='$B' ORDER BY seq DESC LIMIT 3\""
          echo "── audit chain: head + recompute + linkage (register.read rows are forward-only) ──"
          $SSH "sudo -u postgres psql -d hcmos -c \"
            SELECT (SELECT max(seq) FROM audit WHERE company_id='$UAT_CO') AS head_seq,
                   bool_and(hash = encode(sha256(convert_to(prev_hash || concat_ws('|',
                     company_id::text, coalesce(actor,''), coalesce(role,''), action,
                     coalesce(entity,''), coalesce(entity_id,''), ts::text,
                     coalesce(before::text,''), coalesce(after::text,'')), 'UTF8')),'hex')) AS recompute_ok
              FROM audit WHERE company_id='$UAT_CO';
            SELECT count(*) AS linkage_breaks FROM (
              SELECT prev_hash, lag(hash) OVER (PARTITION BY company_id ORDER BY seq) AS expect FROM audit) x
             WHERE (expect IS NULL AND prev_hash <> repeat('0',64)) OR (expect IS NOT NULL AND prev_hash <> expect)\""
          echo "── BUILD_SHA (running process) at END of Wave 7 ──"
          $SSH "curl -fsS http://127.0.0.1:3000/health 2>/dev/null; echo"
          echo "── cleanup: throwaway batch (cascades rows), leave_carry, employee, minted session ──"
          $SSH "cd /opt/hcmos && set -a && . /etc/hcmos/hcmos.env && set +a && node -e '
            const db=require(\"./src/db\");
            (async()=>{ const Z=require(\"/root/wave7.json\");
              await db.withOwner(async c=>{
                await c.query(\"DELETE FROM leave_carry WHERE employee_id=\$1\",[Z.emp]);
                await c.query(\"DELETE FROM exact_batch WHERE id=\$1\",[Z.batch]);
                await c.query(\"DELETE FROM employee WHERE id=\$1\",[Z.emp]);
                if(Z.sid) await c.query(\"DELETE FROM session WHERE id=\$1\",[Z.sid]);
              });
              await db.close(); console.log(\"cleanup done\");
            })().catch(e=>{console.error(e.message);});
          '"
          $SSH "rm -f /root/wave7.json"
